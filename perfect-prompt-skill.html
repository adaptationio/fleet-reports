const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function go(){
  const err=document.getElementById('err');err.textContent='Decrypting…';
  try{
    const pw=new TextEncoder().encode(document.getElementById('pw').value);
    const km=await crypto.subtle.importKey('raw',pw,'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b(P.salt),iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b(P.nonce)},key,b(P.ct));
    document.open();document.write(new TextDecoder().decode(pt));document.close();
  }catch(e){err.textContent='Wrong password.';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
